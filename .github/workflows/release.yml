name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest  # Apple Silicon (arm64) — native on M-series Macs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for accurate commit count

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Auto-set version from commit count
        id: version
        run: |
          BASE=$(node -p "const p=require('./package.json'); \`\${p.version.split('.')[0]}.\${p.version.split('.')[1]}\`")
          PATCH=$(git rev-list --count HEAD)
          VERSION="${BASE}.${PATCH}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Building version ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        # Compiles better-sqlite3 against the exact Electron ABI so the .node
        # binary loads correctly at runtime (prevents "Cannot find module" crash).
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Package app
        # Creates out/Focus-darwin-arm64/Focus.app — no signing yet.
        run: npm run package
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Ad-hoc sign app
        # codesign --sign - applies an ad-hoc signature (no cert, no Apple account needed).
        # This changes Gatekeeper's response from "damaged and can't be opened"
        # (unbypassable) to "Apple cannot verify" (bypassable via System Settings).
        #
        # IMPORTANT: Do NOT use --options runtime (hardened runtime) with ad-hoc signing.
        # Hardened runtime blocks Electron's V8 JIT compilation — the app will launch
        # and immediately crash with "Check with the developer" unless entitlements are
        # also provided. Ad-hoc signing without hardened runtime is the correct approach
        # for distributing without an Apple Developer account.
        run: |
          APP=$(find out -name "Focus.app" -maxdepth 6 | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: Focus.app not found after package step"
            find out -type d | head -20
            exit 1
          fi
          echo "Signing: $APP"
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict "$APP" && echo "✓ Signature verified"
          codesign -dv "$APP" 2>&1 | grep -E "Identifier|Authority|TeamIdentifier|Signature"

      - name: Build DMG from signed app
        # --skip-package tells forge to use the already-built (and signed) .app
        # rather than re-packaging, which would overwrite our signature.
        run: npx electron-forge make --skip-package
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Rename DMG to Focus.dmg
        # Fixed filename so the download URL never changes between releases
        run: |
          DMG=$(find out/make -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found"; find out/make -type f | head -20; exit 1
          fi
          cp "$DMG" out/make/Focus.dmg
          echo "Packaged: out/make/Focus.dmg (v${{ steps.version.outputs.version }})"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Focus v${{ steps.version.outputs.version }}"
          make_latest: true
          body: |
            ## ⬇️ Download Focus for macOS

            **[👉 Download Focus.dmg](https://github.com/${{ github.repository }}/releases/latest/download/Focus.dmg)**

            > macOS 12 (Monterey) or later · Apple Silicon · Free & open source

            ---

            ### Install

            1. Open `Focus.dmg` → drag **Focus** into Applications
            2. Double-click Focus — macOS will show _"Apple cannot verify that Focus is free of malware."_
               Open **System Settings → Privacy & Security** → scroll to the bottom → click **"Open Anyway"** → enter your Mac password → click **Open**
            3. Grant **Accessibility** permission when prompted (required for activity tracking)

            > **Faster bypass (Terminal):** Run this once, then open Focus normally:
            > ```
            > xattr -dr com.apple.quarantine /Applications/Focus.app
            > ```

            ---

            ### Optional: AI-powered reports

            **Local (free)** — [Install Ollama](https://ollama.com) then:
            ```
            ollama serve && ollama pull phi4-mini
            ```
            **Cloud** — Add a Claude or OpenAI key in **Settings → AI**.

            ---
            *Commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})*
          files: out/make/Focus.dmg
