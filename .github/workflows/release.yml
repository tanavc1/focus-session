name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for accurate commit count

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Auto-set version from commit count
        id: version
        run: |
          # Major.Minor come from package.json; patch is the total commit count.
          # Every push to main produces a unique, strictly-increasing version.
          # e.g. 1.0.0 → 1.0.1 → 1.0.2 … with no manual steps required.
          BASE=$(node -p "const p=require('./package.json'); \`\${p.version.split('.')[0]}.\${p.version.split('.')[1]}\`")
          PATCH=$(git rev-list --count HEAD)
          VERSION="${BASE}.${PATCH}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Write the computed version back into package.json before building
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Building version ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Package app (creates .app bundle)
        run: npm run package
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Ad-hoc sign app (prevents "damaged" error on macOS)
        # Signs with local identity (-) instead of an Apple Developer cert.
        # Converts Gatekeeper block from "damaged" (unbypassable) to
        # "unidentified developer" (bypassable with right-click → Open).
        run: |
          APP=$(find out -name "Focus.app" -maxdepth 6 | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: Focus.app not found after package step"
            find out -type d | head -20
            exit 1
          fi
          echo "Signing: $APP"
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict "$APP" && echo "✓ Signature verified"

      - name: Build DMG (from signed .app)
        run: npx electron-forge make --skip-package
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Rename DMG to Focus.dmg
        # Fixed filename so the download URL never changes between releases
        run: |
          DMG=$(find out/make -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found"; find out/make -type f | head -20; exit 1
          fi
          cp "$DMG" out/make/Focus.dmg
          echo "Packaged as out/make/Focus.dmg (v${{ steps.version.outputs.version }})"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Focus v${{ steps.version.outputs.version }}"
          make_latest: true
          body: |
            ## ⬇️ Download Focus for macOS

            **[👉 Download Focus.dmg](https://github.com/${{ github.repository }}/releases/latest/download/Focus.dmg)**

            > macOS 12 (Monterey) or later · Apple Silicon & Intel · Free & open source

            ---

            ### Install in 3 steps

            1. Open `Focus.dmg` → drag **Focus** into Applications
            2. First launch: right-click → **Open** → **Open** again *(one-time Gatekeeper bypass)*
            3. Grant **Accessibility** permission when prompted

            ---

            ### Optional: AI-powered reports

            **Local (free)** — [Install Ollama](https://ollama.com) then:
            ```
            ollama serve && ollama pull phi4-mini
            ```
            **Cloud** — Add a Claude or OpenAI key in **Settings → AI**.

            ---
            *Commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})*
          files: out/make/Focus.dmg
