name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # npm ci runs postinstall which rebuilds better-sqlite3 for Electron
        run: npm ci

      - name: Build DMG
        run: npm run make

      - name: Rename DMG to fixed filename
        # Always name it Focus.dmg so the download URL never changes
        run: |
          DMG=$(find out/make -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found in out/make/"
            find out/make -type f | head -20
            exit 1
          fi
          echo "Found: $DMG"
          cp "$DMG" out/make/Focus.dmg
          echo "Renamed to out/make/Focus.dmg"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Focus — Latest Build"
          make_latest: true
          body: |
            ## ⬇️ Download Focus for macOS

            **[👉 Click here to download Focus.dmg](https://github.com/tanavc1/focus-session/releases/latest/download/Focus.dmg)**

            > Requires macOS 12 (Monterey) or later · Apple Silicon & Intel supported

            ---

            ### Install in 3 steps

            **1. Open the DMG**
            Double-click `Focus.dmg` and drag **Focus** into your Applications folder.

            **2. Bypass Gatekeeper (one time)**
            Right-click **Focus** in Applications → click **Open** → click **Open** again when macOS warns about an unidentified developer.

            **3. Grant Accessibility permission**
            When prompted, go to **System Settings → Privacy & Security → Accessibility** and enable Focus.

            ---

            ### Optional: Track browser URLs

            Go to **System Settings → Privacy & Security → Automation** and enable Focus for your browser (Chrome, Arc, Safari).

            ---

            ### Optional: AI-powered session reports

            Install [Ollama](https://ollama.com) for local AI summaries:
            ```
            brew install ollama
            ollama serve
            ollama pull phi4-mini
            ```
            Then configure it in **Settings → AI** inside the app.

            ---
            *Built from [`${{ github.sha }}`](https://github.com/tanavc1/focus-session/commit/${{ github.sha }})*
          files: out/make/Focus.dmg
